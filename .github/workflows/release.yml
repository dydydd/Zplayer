name: Release

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      draft:
        description: "Create release as draft"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Select ref
        id: ref
        run: echo "ref=${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set date version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(node -e "const f=new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Shanghai',year:'2-digit',month:'numeric',day:'numeric'});const p=Object.fromEntries(f.formatToParts(new Date()).map(x=>[x.type,x.value]));console.log([Number(p.year),Number(p.month),Number(p.day)].join('.'))")"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "$tag already exists; reusing it"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"

  build-linux:
    name: Build Linux
    needs: prepare
    uses: ./.github/workflows/build-linux.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      version: ${{ needs.prepare.outputs.version }}

  build-windows:
    name: Build Windows
    needs: prepare
    uses: ./.github/workflows/build-windows.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      version: ${{ needs.prepare.outputs.version }}

  publish:
    name: Publish release
    needs:
      - prepare
      - build-linux
      - build-windows
    runs-on: ubuntu-22.04
    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Zplayer v${{ needs.prepare.outputs.version }}
          body: "Windows and Linux builds are attached below."
          files: artifacts/*
          overwrite_files: true
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == 'true' }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == 'true' }}
