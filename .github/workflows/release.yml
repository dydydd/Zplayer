name: Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create release as draft"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  publish:
    name: Publish ${{ matrix.platform }}
    needs: check
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-22.04
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Set date version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(node -e "const f=new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Shanghai',year:'2-digit',month:'numeric',day:'numeric'});const p=Object.fromEntries(f.formatToParts(new Date()).map(x=>[x.type,x.value]));console.log([Number(p.year),Number(p.month),Number(p.day)].join('.'))")"
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Stamp app version
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;

          for (const file of ["package.json", "package-lock.json"]) {
            if (!fs.existsSync(file)) continue;
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            json.version = version;
            if (json.packages?.[""]) json.packages[""].version = version;
            fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
          }

          const tauriPath = "src-tauri/tauri.conf.json";
          const tauri = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
          tauri.version = version;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + "\n");

          const cargoPath = "src-tauri/Cargo.toml";
          const cargo = fs.readFileSync(cargoPath, "utf8").replace(/^version = ".*"$/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, cargo);
          NODE

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          tagName: v${{ steps.version.outputs.version }}
          releaseName: Zplayer v${{ steps.version.outputs.version }}
          releaseBody: "Windows and Linux builds are attached below."
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}
          uploadWorkflowArtifacts: true
