name: CI

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create release as draft"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  prepare-release:
    name: Prepare release
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Select ref
        id: ref
        run: echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set date version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(node -e "const f=new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Shanghai',year:'2-digit',month:'numeric',day:'numeric'});const p=Object.fromEntries(f.formatToParts(new Date()).map(x=>[x.type,x.value]));console.log([Number(p.year),Number(p.month),Number(p.day)].join('.'))")"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$tag"
          git push --force origin "refs/tags/$tag"

  build-linux:
    name: Build Linux
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Stamp app version
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;

          for (const file of ["package.json", "package-lock.json"]) {
            if (!fs.existsSync(file)) continue;
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            json.version = version;
            if (json.packages?.[""]) json.packages[""].version = version;
            fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
          }

          const tauriPath = "src-tauri/tauri.conf.json";
          const tauri = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
          tauri.version = version;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + "\n");

          const cargoPath = "src-tauri/Cargo.toml";
          const cargo = fs.readFileSync(cargoPath, "utf8").replace(/^version = ".*"$/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, cargo);
          NODE

      - name: Build Tauri bundles
        run: npm run tauri -- build

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: zplayer-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    name: Build Windows
    needs: prepare-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Stamp app version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;

          for (const file of ["package.json", "package-lock.json"]) {
            if (!fs.existsSync(file)) continue;
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            json.version = version;
            if (json.packages?.[""]) json.packages[""].version = version;
            fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
          }

          const tauriPath = "src-tauri/tauri.conf.json";
          const tauri = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
          tauri.version = version;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + "\n");

          const cargoPath = "src-tauri/Cargo.toml";
          const cargo = fs.readFileSync(cargoPath, "utf8").replace(/^version = ".*"$/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, cargo);
          NODE

      - name: Build Tauri bundles
        run: npm run tauri -- build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: zplayer-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    name: Build macOS
    needs: prepare-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Stamp app version
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;

          for (const file of ["package.json", "package-lock.json"]) {
            if (!fs.existsSync(file)) continue;
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            json.version = version;
            if (json.packages?.[""]) json.packages[""].version = version;
            fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
          }

          const tauriPath = "src-tauri/tauri.conf.json";
          const tauri = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
          tauri.version = version;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + "\n");

          const cargoPath = "src-tauri/Cargo.toml";
          const cargo = fs.readFileSync(cargoPath, "utf8").replace(/^version = ".*"$/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, cargo);
          NODE

      - name: Build Tauri bundles
        run: npm run tauri -- build

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v4
        with:
          name: zplayer-macos
          if-no-files-found: error
          path: src-tauri/target/release/bundle/dmg/*.dmg

  publish-release:
    name: Publish release
    needs:
      - prepare-release
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          name: Zplayer v${{ needs.prepare-release.outputs.version }}
          body: "Windows, Linux, and macOS builds are attached below."
          files: artifacts/**/*
          overwrite_files: true
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == 'true' }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == 'true' }}
